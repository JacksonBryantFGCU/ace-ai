document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ound\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>2 free interviews<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:7px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>No card required<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- hero demo card -->\n          <div style=\"flex:1 1 380px;min-width:300px;display:flex;justify-content:center;\">\n            <div style=\"width:100%;max-width:440px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow);\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink2);font-size:14px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>Technical Interview<\u002Fdiv>\n                <span style=\"font-family:'JetBrains Mono';font-size:13px;font-weight:500;color:#fff;background:#ef4444;border-radius:9px;padding:5px 10px;animation:floaty 3s ease-in-out infinite;\">01:58<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n                <div style=\"position:relative;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2f6bff,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;\">C\n                  <span style=\"position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;background:#22c55e;border:2px solid #fff;\"><\u002Fspan>\n                <\u002Fdiv>\n                <div><div style=\"font-weight:600;font-size:15px;\">Cassidy<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);\">Senior Interviewer · AI<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:18px;\">\n                <div style=\"background:#eef3ff;border:1px solid #dbe7ff;border-radius:14px;padding:13px 15px;\"><div style=\"font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px;letter-spacing:.04em;\">INTERVIEWER<\u002Fdiv><div style=\"font-size:14px;color:var(--ink2);line-height:1.5;\">Walk me through how you'd debug a slow API endpoint in production.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#faf2fb;border:1px solid #f3ddef;border-radius:14px;padding:13px 15px;\"><div style=\"font-size:11px;font-weight:700;color:var(--pink);margin-bottom:4px;letter-spacing:.04em;\">YOU<\u002Fdiv><div style=\"font-size:14px;color:var(--ink2);line-height:1.5;\">First I'd check the traces and isolate whether it's the query or the network<span style=\"display:inline-block;width:2px;height:15px;background:var(--pink);margin-left:2px;vertical-align:middle;animation:floaty 1s steps(2) infinite;\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:center;gap:4px;height:48px;background:var(--bg2);border-radius:14px;\">\n                <span style=\"width:3px;height:60%;border-radius:3px;background:var(--grad);animation:wave 1s ease-in-out infinite;\"><\u002Fspan>\n                <span style=\"width:3px;height:90%;border-radius:3px;background:var(--grad);animation:wave 1s ease-in-out .1s infinite;\"><\u002Fspan>\n                <span style=\"width:3px;height:40%;border-radius:3px;background:var(--grad);animation:wave 1s ease-in-out .2s infinite;\"><\u002Fspan>\n                <span style=\"width:3px;height:75%;border-ra <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h3 style=\"font-size:19px;font-weight:700;margin-top:18px;\">Behavioral interviews<\u002Fh3>\n            <p style=\"font-size:14.5px;color:var(--ink2);margin-top:8px;line-height:1.6;\">STAR-style questions with adaptive follow-ups that probe your real experience — just like a hiring manager.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow-sm);\">\n            <div style=\"width:46px;height:46px;border-radius:13px;background:#f3edff;display:flex;align-items:center;justify-content:center;color:var(--violet);\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"><\u002Fpolyline><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <h3 style=\"font-size:19px;font-weight:700;margin-top:18px;\">Technical interviews<\u002Fh3>\n            <p style=\"font-size:14.5px;color:var(--ink2);margin-top:8px;line-height:1.6;\">System design and problem-solving rounds with an in-browser code editor and a live multi-language runner.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow-sm);\">\n            <div style=\"width:46px;height:46px;border-radius:13px;background:#fdeef7;display:flex;align-items:center;justify-content:center;color:var(--pink);\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path -content:center;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 0 1-14 0v-2M12 19v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h2 style=\"font-size:clamp(24px,3vw,32px);font-weight:800;margin-top:18px;\">Voice AI interviewer<\u002Fh2>\n            <p style=\"font-size:16.5px;color:var(--ink2);margin-top:12px;line-height:1.65;\">Real interviews happen out loud. Speak your answers and hear the interviewer respond in natural, low-latency voice — so you rehearse pacing, filler words, and nerves, not just the words on a page.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 320px;min-width:280px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;gap:5px;height:130px;\">\n            <span style=\"width:4px;height:40%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:75%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out .1s infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:100%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out .2s infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:60%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out .3s infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:85%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out .15s infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:50%;border-radius:4px;background:var(--grad);animation:wave 1s ease-in-out .25s infinite;\"><\u002Fspan>\n            <span style=\"width:4px;height:90%;border-radius:4px;background:var(--grad u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ HOW IT WORKS ============ -->\n    <section data-page=\"how\" data-screen-label=\"How It Works\">\n      <div style=\"background:var(--grad-soft);border-bottom:1px solid var(--line);\">\n        <div style=\"max-width:900px;margin:0 auto;padding:clamp(56px,8vw,88px) 28px;text-align:center;\">\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;\" class=\"grad-text\">How it works<\u002Fdiv>\n          <h1 style=\"font-size:clamp(34px,5vw,56px);line-height:1.05;font-weight:800;margin-top:14px;\">Eight steps from nervous to ready<\u002Fh1>\n          <p style=\"font-size:clamp(16px,1.9vw,20px);color:var(--ink2);margin-top:18px;line-height:1.6;max-width:58ch;margin-left:auto;margin-right:auto;\">The whole loop takes minutes — and every time around, you get a little sharper.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"max-width:760px;margin:0 auto;padding:clamp(48px,7vw,80px) 28px;\">\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <div style=\"display:flex;gap:22px;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;\"><span style=\"width:44px;height:44px;flex-shrink:0;border-radius:13px;background:var(--grad);color:#fff;font-family:'Sora';font-weight:800;display:flex;align-items:center;justify-content:center;font-size:18px;\">1<\u002Fspan><span style=\"flex:1;width:2px;background:var(--line2);margin:8px 0;\"><\u002Fspan><\u002Fdiv>\n            <div style=\"padding-bottom:34px;\"><h3 style=\"font-size:20px;font-weight:700;\">Sign up<\u002Fh3><p style=\"font-size:15px;color:var(--ink2);margin-top:7px;line-height:1.6;\">Create your account in seconds. Your free interview is unlocked immediately — no card required.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:22px;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center p style=\"font-size:clamp(16px,1.9vw,20px);color:var(--ink2);margin-top:18px;line-height:1.6;max-width:54ch;margin-left:auto;margin-right:auto;\">Everything candidates ask before their first interview. Still curious? <a data-nav=\"contact\" href=\"#contact\" style=\"color:var(--violet);font-weight:600;\">Get in touch.<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"max-width:780px;margin:0 auto;padding:clamp(48px,7vw,72px) 28px;display:flex;flex-direction:column;gap:12px;\">\n        <details style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 4px;\"><summary style=\"list-style:none;cursor:pointer;font-weight:700;font-size:16.5px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">What exactly is ACE.AI?<span style=\"color:var(--violet);font-size:22px;font-weight:400;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary><p style=\"font-size:15px;color:var(--ink2);line-height:1.65;padding:0 18px 18px;\">ACE.AI is an AI-powered interview practice platform. You take realistic behavioral and technical mock interviews — spoken out loud with a voice AI — and get a structured evaluation, transcript, and progress tracking so you walk into the real thing prepared.<\u002Fp><\u002Fdetails>\n        <details style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 4px;\"><summary style=\"list-style:none;cursor:pointer;font-weight:700;font-size:16.5px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">Do I need to install anything?<span style=\"color:var(--violet);font-size:22px;font-weight:400;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary><p style=\"font-size:15px;color:var(--ink2);line-height:1.65;padding:0 18px 18px;\">No downloads. ACE.AI runs entirely in your browser. For voice interviews you'll just grant microphone access when prompted.<\u002Fp><\u002Fdetails>\n        <details style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 4px;\"><summary style=\"list-style:none;cursor:pointer;font-weight:700;font-size:16.5px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">Are the free interviews really free?<span style=\"color:var(--violet);font-size:22px;font-weight:400;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary><p style=\"font-size:15px;color:var(--ink2);line-height:1.65;padding:0 18px 18px;\">Yes. Create an account and run two complete interviews — one behavioral and one technical — with the full voice experience, AI evaluation, and transcripts included, and no credit card required.<\u002Fp><\u002Fdetails>\n        <details style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 4px;\"><summary style=\"list-style:none;cursor:pointer;font-weight:700;font-size:16.5px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">Why do I need an account for the free interviews?<span style=\"color:var(--violet);font-size:22px;font-weight:400;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary><p style=\"font-size:15px;color:var(--ink2);line-height:1.65;padding:0 18px 18px;\">Your account is what saves your interview, evaluation, and transcript so you can review them later — and it's how we keep your free interview tied to you.<\u002Fp><\u002Fdetails>\n        <details style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 4px;\"><summary style=\"list-style:none;cursor:pointer;font-weight:700;font-size:16.5px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">What's included in Pro?<span style=\"color:var(--violet);font-size:22px;font-weight:400;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary><p style=\"font-size:15px;color:var(--ink2);line-height:1.65;padding:0 18px 18px;\">Pro ($20/month) unlocks unlimited interviews, full analytics and progress tracking, complete interview history, all role t
